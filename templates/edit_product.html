<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-warning text-dark"><h3>Edit Product</h3></div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label>Product Name</label>
                    <input type="text" name="name" value="{{ product.name }}" class="form-control">
                </div>
                <div class="mb-3">
                    <label>Category</label>
                    <input type="text" name="category" value="{{ product.category }}" class="form-control">
                </div>
                <div class="row">
                    <div class="col"><label>Price</label><input type="number" step="0.01" name="price" value="{{ product.price }}" class="form-control"></div>
                    <div class="col"><label>Tax %</label><input type="number" step="0.01" name="tax" value="{{ product.tax_percentage }}" class="form-control"></div>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-success">Update Product</button>
                    <a href="{% url 'product_master' %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
