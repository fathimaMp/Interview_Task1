<h3>Product Master</h3>
<form method="POST" class="row g-3 mb-4">
    {% csrf_token %}
    <div class="col-md-3"><input type="text" name="name" class="form-control" placeholder="Product Name" required></div>
    <div class="col-md-3"><input type="text" name="category" class="form-control" placeholder="Category"></div>
    <div class="col-md-2"><input type="number" step="0.01" name="price" class="form-control" placeholder="Price"></div>
    <div class="col-md-2"><input type="number" step="0.01" name="tax" class="form-control" placeholder="Tax %"></div>
    <div class="col-md-2"><button type="submit" class="btn btn-primary w-100">Save Product</button></div>
</form>

<table class="table table-striped">
    <thead>
        <tr><th>Name</th><th>Category</th><th>Price</th><th>Tax %</th><th>Action</th></tr>
    </thead>
    <tbody>
        {% for p in products %}
        <tr>
            <td>{{ p.name }}</td>
            <td>{{ p.category }}</td>
            <td>{{ p.price }}</td>
            <td>{{ p.tax_percentage }}%</td>
            <td><a href="{% url 'edit_product' p.id %}" class="btn btn-sm btn-warning">Edit</a></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
